name: 🔄 Auto-Update README Stats

on:
  # ── Runs every 4 hours ──────────────────────────────────────────────────────
  schedule:
    - cron: '0 */4 * * *'

  # ── Manual trigger from the Actions tab ─────────────────────────────────────
  workflow_dispatch:

  # ── Also runs on every push to main ─────────────────────────────────────────
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1 — Refresh README stats cache every 4 hours
  # ════════════════════════════════════════════════════════════════════════════
  refresh-stats:
    name: 🔄 Refresh Stats Cache
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # Inject an invisible timestamp comment into README.md.
      # This forces GitHub to re-request all embedded stat images
      # instead of serving stale cached versions.
      - name: 🕒 Bump cache-bust timestamp
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          # Remove the previous timestamp line (if any) and add a fresh one
          sed -i '/<!-- last-updated:/d' README.md
          printf '\n<!-- last-updated: %s -->\n' "$TIMESTAMP" >> README.md

      - name: 📤 Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "✅ Nothing changed — skipping commit."
          else
            git commit -m "chore: 🔄 refresh stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2 — Update profile stats card via readme-stats cache purge
  # ════════════════════════════════════════════════════════════════════════════
  purge-stats-cache:
    name: 🗑️ Purge Stats Card Cache
    runs-on: ubuntu-latest
    needs: refresh-stats

    steps:
      # Ping the github-readme-stats API directly to warm the cache for
      # mehedi2580 so the card is fresh when GitHub renders the README.
      - name: 📡 Warm Stats Card Cache
        run: |
          echo "Pinging stats card..."
          curl -s -o /dev/null -w "Stats card: %{http_code}\n" \
            "https://github-readme-stats.vercel.app/api?username=mehedi2580&show_icons=true&hide_border=true&bg_color=0D1117&title_color=58A6FF&icon_color=58A6FF&text_color=C9D1D9&rank_icon=default&count_private=true&include_all_commits=true"

          echo "Pinging top-langs card..."
          curl -s -o /dev/null -w "Top langs: %{http_code}\n" \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=mehedi2580&layout=compact&hide_border=true&bg_color=0D1117&title_color=58A6FF&text_color=C9D1D9&langs_count=8"

          echo "Pinging streak card..."
          curl -s -o /dev/null -w "Streak: %{http_code}\n" \
            "https://streak-stats.demolab.com?user=mehedi2580&hide_border=true&background=0D1117&stroke=58A6FF&ring=58A6FF&fire=79C0FF&currStreakLabel=58A6FF&sideLabels=58A6FF&dates=8B949E&sideNums=C9D1D9&currStreakNum=C9D1D9"

          echo "Pinging activity graph..."
          curl -s -o /dev/null -w "Activity graph: %{http_code}\n" \
            "https://github-readme-activity-graph.vercel.app/graph?username=mehedi2580&bg_color=0D1117&color=58A6FF&line=58A6FF&point=79C0FF&area=true&area_color=58A6FF&hide_border=true"

          echo "✅ All cards pinged."
