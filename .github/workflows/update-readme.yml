name: 🔄 Auto-Update README Stats

on:
  # Run every 4 hours automatically
  schedule:
    - cron: '0 */4 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

  # Also run on every push to main
  push:
    branches:
      - main

jobs:
  update-readme:
    name: Refresh GitHub Stats & Profile Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout the profile repo ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Cache-bust the readme-stats cards ──────────────────────────────
      # GitHub caches external images for up to 5 minutes, but the stats
      # services have their own caches. Touching README.md with an invisible
      # timestamp comment forces GitHub to re-render all embedded images.
      - name: 🕒 Inject refresh timestamp
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          # Remove any previous timestamp line, then append a fresh one
          sed -i '/<!-- stats-refresh:/d' README.md
          echo "" >> README.md
          echo "<!-- stats-refresh: ${TIMESTAMP} -->" >> README.md

      # ── 3. Commit & push only when something changed ──────────────────────
      - name: 📤 Commit updated README
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if there's a real diff
          if git diff --cached --quiet; then
            echo "No changes to commit — skipping."
          else
            git commit -m "chore: 🔄 auto-refresh stats [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

  # ── Optional: regenerate the contribution-snake SVG every 4 hours ─────────
  generate-snake:
    name: 🐍 Regenerate Contribution Snake
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: 📤 Push snake SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
